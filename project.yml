name: MonoGrid
options:
  bundleIdPrefix: com.suyoung
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"

targets:
  MonoGrid:
    type: application
    platform: iOS
    sources:
      - path: MonoGrid/MonoGrid
        excludes:
          - "**/*.xcassets"
      - path: MonoGrid/Intents
    resources:
      - path: MonoGrid/MonoGrid/Resources/Assets.xcassets
      - path: MonoGrid/MonoGrid/Resources/Localizable.xcstrings
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suyoung.monogrid
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "MonoGrid"
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    entitlements:
      path: MonoGrid/MonoGrid.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.suyoung.monogrid
    dependencies:
      - target: MonoGridWidgetExtension
        embed: true

  MonoGridWidgetExtension:
    type: app-extension
    platform: iOS
    product: MonoGridWidgetExtension
    sources:
      - path: MonoGrid/MonoGridWidget
      - path: MonoGrid/Intents
      - path: MonoGrid/MonoGrid/Models
      - path: MonoGrid/MonoGrid/Extensions
      - path: MonoGrid/MonoGrid/Repository
      - path: MonoGrid/MonoGrid/Utils
      - path: MonoGrid/MonoGrid/Theme
      - path: MonoGrid/MonoGrid/App/PersistenceController.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suyoung.monogrid.widget
        INFOPLIST_KEY_CFBundleDisplayName: "MonoGrid Widget"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    info:
      path: MonoGrid/MonoGridWidget/Info.plist
      properties:
        CFBundleDisplayName: "MonoGrid Widget"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: MonoGrid/MonoGridWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.suyoung.monogrid

  MonoGridTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MonoGrid/Tests
    dependencies:
      - target: MonoGrid
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.suyoung.monogrid.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MonoGrid:
    build:
      targets:
        MonoGrid: all
        MonoGridWidgetExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MonoGridTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
