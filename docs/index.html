<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonoGrid - Minimalist Habit Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        .app-icon {
            width: 120px;
            height: 120px;
            border-radius: 27px;
            background: #4A90D9;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .app-icon svg {
            width: 70px;
            height: 70px;
            fill: white;
        }
        h1 {
            color: white;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .tagline {
            color: rgba(255,255,255,0.9);
            font-size: 1.3em;
            margin-bottom: 40px;
        }
        .features {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: left;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .features h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .feature-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .feature-icon {
            font-size: 1.5em;
            margin-right: 15px;
            min-width: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            display: inline-block;
            padding: 15px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .link-btn.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9em;
        }
        footer a { color: rgba(255,255,255,0.9); }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">
            <svg viewBox="0 0 100 100">
                <rect x="15" y="15" width="70" height="70" rx="8" fill="none" stroke="white" stroke-width="4"/>
                <line x1="15" y1="38" x2="85" y2="38" stroke="white" stroke-width="3"/>
                <line x1="15" y1="61" x2="85" y2="61" stroke="white" stroke-width="3"/>
                <line x1="38" y1="15" x2="38" y2="85" stroke="white" stroke-width="3"/>
                <line x1="61" y1="15" x2="61" y2="85" stroke="white" stroke-width="3"/>
                <polyline points="30,52 42,64 70,36" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h1>MonoGrid</h1>
        <p class="tagline">미니멀 습관 트래커</p>

        <div class="features">
            <h2>주요 기능</h2>
            <div class="feature-item">
                <span class="feature-icon">📊</span>
                <div>
                    <strong>GitHub 스타일 그리드</strong><br>
                    365일 기여 그래프로 습관을 시각화
                </div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🎯</span>
                <div>
                    <strong>3개 습관 집중</strong><br>
                    핵심 습관에만 집중하여 실천력 향상
                </div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📱</span>
                <div>
                    <strong>위젯 & 단축어</strong><br>
                    앱 실행 없이 빠르게 기록
                </div>
            </div>
            <div class="feature-item">
                <span class="feature-icon">☁️</span>
                <div>
                    <strong>iCloud 동기화</strong><br>
                    모든 기기에서 자동 동기화
                </div>
            </div>
        </div>

        <div class="links">
            <a href="https://apps.apple.com/app/monogrid" class="link-btn">App Store에서 다운로드</a>
            <a href="privacy-policy.html" class="link-btn secondary">개인정보 처리방침</a>
            <a href="support.html" class="link-btn secondary">지원 및 문의</a>
        </div>

        <footer>
            <p>&copy; 2025 MonoGrid. All rights reserved.</p>
            <p><a href="https://github.com/tasddc1226/MonoGrid">GitHub</a></p>
        </footer>
    </div>
</body>
</html>
